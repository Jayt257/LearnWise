# docker-compose.yml
# Local full-stack testing — runs backend + frontend + postgres in containers.
# Use this to verify your Docker images work correctly before deploying to Render.
#
# Usage:
#   export GROQ_API_KEY=your_key_here
#   docker compose up --build
#
# Then open: http://localhost:3000  (frontend)
#            http://localhost:8000/api/health  (backend health check)

version: '3.9'

services:

  # ── PostgreSQL (local only, Render provides managed DB in production) ──
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: learnwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass123
    ports:
      - "5433:5432"   # 5433 on host to avoid conflict with local postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI + Uvicorn) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Database — points to the local postgres service above
      DATABASE_URL: postgresql://postgres:localpass123@db:5432/learnwise

      # JWT — use a real secret in production (never commit this)
      SECRET_KEY: local-dev-secret-replace-in-production-64chars

      # Groq AI — read from shell env so it never touches this file
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.1-8b-instant

      # CORS — allow the local frontend container
      ALLOWED_ORIGINS: http://localhost:3000

      # Admin seed account
      ADMIN_EMAIL: admin@learnwise.app
      ADMIN_PASSWORD: Admin@Local2026
      ADMIN_USERNAME: admin

      # Use small Whisper model locally (faster, less RAM)
      WHISPER_MODEL: small

      # Threshold override disabled
      SCORE_THRESHOLD_OVERRIDE: "-1"

      # Data directory inside container
      DATA_DIR: data

    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount local data dir so admin changes during testing survive container restarts
      - ./backend/data:/app/data

  # ── Frontend (Nginx + React) ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Point the built JS bundle at the local backend
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
